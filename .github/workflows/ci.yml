name: CI
on:
    pull_request:
    push: { branches: [develop] }
permissions: { contents: read, pull-requests: read }
jobs:
    ci:
        name: lint
        runs-on: codeberg-small-lazy
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with: { go-version: stable }
            - name: golangci-lint
              uses: golangci/golangci-lint-action@v9
              with: { version: v2.4.0 }
