name: Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish to ghcr
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lightning-amd64 ./cmd/lightning/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o lightning-arm64 ./cmd/lightning/main.go          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: login to ghcr
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: build image with podman
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ghcr.io/williamhorning/lightning
          archs: amd64, arm64
          tags: latest ${{github.ref_name}}
          containerfiles: ./containerfile
          build-args: |
            TARGETARCH=amd64
            TARGETARCH=arm64
      - name: push to ghcr.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}