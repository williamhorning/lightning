name: Build
on:
  workflow_dispatch:
  release: { types: [published] }
permissions:
  contents: read
  packages: write
jobs:
  publish:
    name: publish to ghcr
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: set up qemu
        uses: docker/setup-qemu-action@v3
      - name: setup buildx
        uses: docker/setup-buildx-action@v3
      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: jersey
          password: ${{ secrets.CODEBERG_TOKEN }}
      - name: build image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          context: .
          file: ./containerfile
          tags: |
            codeberg.org/jersey/lightning:latest
            codeberg.org/jersey/lightning:${{ github.ref_name }}
